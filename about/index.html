<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>About Me</title>
<link rel="icon" type="image/x-icon" href="/images/favicon.png">
<link rel="stylesheet" href="/css/style.css">

<!-- This script stops the loading flash by checking the theme before anything else loads -->
<script>
    (function() {
        const savedTheme = localStorage.getItem('portfolio-theme');
        // If user explicitly chose light, or if they have no preference set yet but their system prefers light
        if (savedTheme === 'light') {
            document.documentElement.className = 'light-mode';
        } else {
            document.documentElement.className = 'dark-mode';
        }
    })();
</script>

</head>
<body>

<nav>
    <div class="nav-content">
        <!-- The theme toggle button stays on the left -->
        <button class="theme-toggle">
            <ion-icon name="sunny-outline"></ion-icon>
        </button>

        <!-- The wrapper grouping your menu links together -->
        <div class="nav-links">
            <a href="/">Home</a>
            <a href="/contact">Contact</a>
            <a href="/about" class="active">About</a>
        </div>
    </div>
</nav>

<main class="container">
    
</main>

</html>
