<!-- This script stops the loading flash by checking the theme before anything else loads -->
<script>
    (function() {
        const savedTheme = localStorage.getItem('portfolio-theme');
        // If user explicitly chose light, or if they have no preference set yet but their system prefers light
        if (savedTheme === 'light') {
            document.documentElement.className = 'light-mode';
        } else {
            document.documentElement.className = 'dark-mode';
        }
    })();
</script>

</head>
<body>

<nav>
    <div class="nav-content">
        <!-- The theme toggle button stays on the left -->
        <button class="theme-toggle">
            <ion-icon name="sunny-outline"></ion-icon>
        </button>

        <div class="nav-links">
            <a href="index.html" class="active">Home</a>
            <a href="contact.html">Contact</a>
            <a href="about.html">About</a>
        </div>
    </div>
</nav>
